name: helm
permissions:
  packages: write
  contents: read
on:
  push:
    branches:
      - main
env:
  CHART_NAME: tgtubenotibot
  VERSION: main
jobs:
  job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: version
        run: |
          sed -i -e "s/__VERSION__/$VERSION/g" helm/Chart.yaml
      - name: push
        uses: bsord/helm-push@v4
        with:
          useOCIRegistry: true
          registry-url:  oci://ghcr.io/${{ github.repository }}
          username: ${{ github.repository_owner }}
          access-token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
          force: true
          chart-folder: helm
